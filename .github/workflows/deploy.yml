name: Deploy to Cloud Run and Firebase Hosting

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker

      - name: Build and push Docker image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/middle-east-aggregator:${{ github.sha }} .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/middle-east-aggregator:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy middle-east-aggregator \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/middle-east-aggregator:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 10 \
            --min-instances 0 \
            --timeout 300 \
            --set-env-vars "GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }},GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},TRANSLATION_MODE=titles_and_summary,TRANSLATION_MONTHLY_LIMIT=500000,TRANSLATION_SAFE_MARGIN=0.80,TRANSLATION_DISABLE_THRESHOLD=0.95,TRANSLATION_DAILY_LIMIT=20000,TRANSLATION_MAX_PER_ARTICLE=5000"

      - name: Get Cloud Run service URL
        id: get-url
        run: |
          URL=$(gcloud run services describe middle-east-aggregator \
            --region us-central1 \
            --format 'value(status.url)')
          echo "Backend deployed to: $URL"
          echo "url=$URL" >> $GITHUB_OUTPUT

  deploy-frontend:
    name: Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ needs.deploy-backend.outputs.url }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.GCP_PROJECT_ID }}
          channelId: live
          entryPoint: .
          target: production

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Deployment Success
        if: needs.deploy-backend.result == 'success' && needs.deploy-frontend.result == 'success'
        run: |
          echo "✅ Deployment successful!"
          echo "Backend: ${{ needs.deploy-backend.outputs.url }}"
          echo "Frontend: Firebase Hosting"

      - name: Deployment Failed
        if: needs.deploy-backend.result == 'failure' || needs.deploy-frontend.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          exit 1
